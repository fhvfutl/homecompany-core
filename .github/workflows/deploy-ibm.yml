name: Deploy to IBM

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to IBM Server
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: \${{ secrets.DOCKER_USERNAME }}
          password: \${{ secrets.DOCKER_PASSWORD }}
      
      - name: Build and push Docker image
        run: |
          docker build -t homecompany-core:latest .
          docker tag homecompany-core:latest \${{ secrets.DOCKER_USERNAME }}/homecompany-core:latest
          docker push \${{ secrets.DOCKER_USERNAME }}/homecompany-core:latest
      
      - name: Deploy to IBM
        uses: appleboy/ssh-action@master
        with:
          host: 192.168.1.4
          username: aicompany
          key: \${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            docker pull \${{ secrets.DOCKER_USERNAME }}/homecompany-core:latest
            docker stop homecompany || true
            docker rm homecompany || true
            docker run -d --name homecompany --restart unless-stopped               -p 5000:5000               -e LOG_LEVEL=INFO               -e API_HOST=0.0.0.0               -e API_PORT=5000               -e REDIS_HOST=redis               -e REDIS_PORT=6379               -v \$(pwd)/logs:/home/homecompany/logs               -v \$(pwd)/data:/home/homecompany/data               \${{ secrets.DOCKER_USERNAME }}/homecompany-core:latest
      
      - name: Check deployment
        run: |
          sleep 5
          curl -f http://192.168.1.4:5000/ || exit 1
