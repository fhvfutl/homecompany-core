services:
  homecompany:
    image: fhvfutl/homecompany-core:latest
    container_name: homecompany
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - LOG_LEVEL=INFO
      - API_HOST=0.0.0.0
      - API_PORT=5000
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
    volumes:
      - ./data:/home/homecompany/data
      - ./logs:/home/homecompany/logs
    depends_on:
      - redis
    networks:
      - homecompany-network

  redis:
    image: redis:7-alpine
    container_name: homecompany-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    networks:
      - homecompany-network

  nginx:
    image: nginx:1.27-alpine
    container_name: homecompany-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - homecompany
    networks:
      - homecompany-network

networks:
  homecompany-network:
    driver: bridge

volumes:
  redis_data:
